services:
  jm-sp-bot:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - APP_ENV=local
      - DATABASE_URL=sqlite:///data/app.db
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - AUTH_SECRET=change-this-local-secret
      - AUTH_SESSION_SECONDS=28800
    restart: unless-stopped
