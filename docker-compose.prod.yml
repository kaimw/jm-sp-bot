services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jm_sp_bot}
      POSTGRES_USER: ${POSTGRES_USER:-jm_sp_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jm_sp_bot} -d ${POSTGRES_DB:-jm_sp_bot}"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  jm-sp-bot:
    build:
      context: .
    image: jm-sp-bot:${APP_IMAGE_TAG:-latest}
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-jm_sp_bot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-jm_sp_bot}
      ATTACHMENT_STORAGE_DIR: /app/data/attachments
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - app_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)); raise SystemExit(0 if data.get('status') == 'ok' else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
  app_data:
